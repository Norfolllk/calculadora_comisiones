<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="contenedor">
         <img src="dog_bank.png" alt="Logo de la empresa" class="logo">
        <h1>-Banco L`Barbare-</h1>
        <h1>Calculadora de Comisiones</h1>

        <label>Salario Base:</label>
        <input type="text" id="txtSueldoBase" onblur="validarInput(this)" />
        <small id="error_txtSueldoBase" class="error"></small>

        <label>Número de ventas:</label>
        <input type="text" id="txtVentas" onblur="validarInput(this)" />
        <small id="error_txtVentas" class="error"></small>

        <label>Precio del producto:</label>
        <input type="text" id="txtPrecio" onblur="validarInput(this)" />
        <small id="error_txtPrecio" class="error"></small>

        <button onclick="calcular()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Calcular Comisión
        </button>

        <h2>Resultados</h2>
        <p>Salario Base: <span id="spSueldoBase"></span></p>
        <p>Comisión: <span id="spComision"></span></p>
        <p>Total: <span id="spTotal"></span></p>
    </div>    
</body>
</html>
